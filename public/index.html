<!DOCTYPE html>
<html>
<head>
  <title>Secure AI SaaS</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0b0f;
      color:white;
    }

    #login{
      width:300px;
      margin:100px auto;
      background:#11121a;
      padding:20px;
      border-radius:10px;
    }

    input{
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#2b6cff;
      color:white;
      border:none;
      cursor:pointer;
    }

    #chatUI{
      display:none;
      height:100vh;
      flex-direction:column;
    }

    #chat{
      flex:1;
      overflow-y:auto;
      padding:10px;
    }

    .msg{
      padding:10px;
      margin:5px;
      border-radius:8px;
    }

    .user{
      background:#2b6cff;
    }

    .ai{
      background:#1c1c24;
    }
  </style>
</head>

<body>

<div id="login">
  <h2>Secure AI Login</h2>

  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="chatUI">

  <div id="chat"></div>

  <div style="display:flex;padding:10px;">
    <input id="msg" placeholder="message">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

let token = "";
let chatId = Date.now().toString();

function register(){

  fetch("/api/register",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    alert(JSON.stringify(d));
  });
}

function login(){

  fetch("/api/login",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  })
  .then(r=>r.json())
  .then(d=>{

    if(d.token){

      token = d.token;

      login.style.display = "none";
      chatUI.style.display = "flex";

    }else{
      alert(d.error);
    }

  });
}

function send(){

  const text = msg.value;

  msg.value = "";

  add(text,"user");

  fetch("/api/chat",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({
      message:text,
      chatId
    })
  })
  .then(r=>r.json())
  .then(d=>{
    add(d.reply,"ai");
  });
}

function add(text,type){

  const div = document.createElement("div");

  div.className = "msg " + type;

  div.innerText = text;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
