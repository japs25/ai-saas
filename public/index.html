<!DOCTYPE html>
<html>
<head>
  <title>Secure AI SaaS</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0b0f;
      color:white;
    }

    /* LOGIN BOX */
    #login{
      width:300px;
      margin:100px auto;
      background:#11121a;
      padding:20px;
      border-radius:10px;
    }

    input{
      width:100%;
      padding:10px;
      margin:5px 0;
      border:none;
      border-radius:6px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#2b6cff;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:6px;
    }

    /* CHAT UI */
    #chatUI{
      display:none;
      height:100vh;
      flex-direction:column;
    }

    #chat{
      flex:1;
      overflow-y:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
    }

    .msg{
      padding:10px;
      margin:5px;
      border-radius:8px;
      max-width:70%;
    }

    .user{
      background:#2b6cff;
      align-self:flex-end;
    }

    .ai{
      background:#1c1c24;
      align-self:flex-start;
    }

    .bottom{
      display:flex;
      padding:10px;
      gap:10px;
    }

    .bottom input{
      flex:1;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>

  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chatUI">

  <div id="chat"></div>

  <div class="bottom">
    <input id="msg" placeholder="message">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

let token = "";
let chatId = Date.now().toString();

/* ---------------- REGISTER ---------------- */
function register(){

  fetch("/api/register",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      alert("Account created successfully!");
    } else {
      alert(d.error || "Register failed");
    }
  });
}

/* ---------------- LOGIN ---------------- */
function login(){

  fetch("/api/login",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  })
  .then(r=>r.json())
  .then(d=>{

    console.log("LOGIN RESPONSE:", d);

    if(d.token){

      token = d.token;
      localStorage.setItem("token", token);

      document.getElementById("login").style.display = "none";
      document.getElementById("chatUI").style.display = "flex";

      localStorage.setItem("username", d.username);

    } else {
      alert(d.error || "Login failed");
    }

  })
  .catch(err=>{
    alert("Error: " + err.message);
  });
}

/* ---------------- SEND MESSAGE ---------------- */
function send(){

  const text = msg.value;
  msg.value = "";

  const savedToken = localStorage.getItem("token");

  add(text,"user");

  fetch("/api/chat",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": savedToken
    },
    body:JSON.stringify({
      message:text,
      chatId
    })
  })
  .then(r=>r.json())
  .then(d=>{
    add(d.reply,"ai");
  });
}

/* ---------------- ADD MESSAGE ---------------- */
function add(text,type){

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
